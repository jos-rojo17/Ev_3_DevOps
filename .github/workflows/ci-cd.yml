name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-and-analyze:
    name: Build, Test and SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build, Test and Analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub lo provee automáticamente
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # El secreto que creaste
        # REEMPLAZA "tu_project_key" y "tu_organizacion" con los datos de SonarCloud
        run: |
          mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=jos-rojo17_Ev_3_DevOps \
          -Dsonar.organization=jos-rojo17 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.qualitygate.wait=true
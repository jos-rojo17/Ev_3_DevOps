version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: usuariosdb

    ports:
      - "3306:3306"

  app:
    build: .
    container_name: springboot-app
    restart: always

    ports:
      - "8080:8080"

    depends_on:
      - mysql
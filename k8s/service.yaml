apiVersion: v1
kind: Service
metadata:
  name: springboot-app-service
spec:
  type: LoadBalancer # Esto nos dará una IP pública o puerto para acceder
  selector:
    app: springboot-app
  ports:
    - protocol: TCP
      port: 80 # El puerto expuesto al exterior
      targetPort: 8080 # El puerto interno de tu contenedor Spring Boot